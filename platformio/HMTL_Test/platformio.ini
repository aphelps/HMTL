#
# HMTL native unit tests — runs firmware logic on the desktop without hardware
#
# Usage:
#   cd platformio/HMTL_Test
#   pio test -e native
#

[env:native]
platform = native
test_framework = unity
lib_deps =
  hmtl_sources
build_flags =
  -std=c++11
  -include Arduino.h
  -I stubs
  -I ../../Libraries/HMTLMessaging
  -I ../../Libraries/HMTLTypes
  -I /Users/amp/Dropbox/Arduino/libraries/Socket
  -DDISABLE_RS485
  -DDISABLE_MPR121
  -DDISABLE_XBEE
  -DDEBUG_LEVEL=5

[env:native_coverage]
extends = env:native
build_flags =
  ${env:native.build_flags}
  -fprofile-instr-generate
  -fcoverage-mapping
  -L/Library/Developer/CommandLineTools/usr/lib/clang/17/lib/darwin
  -lclang_rt.profile_osx
